# ---- Required ---------------------------------------------------------------
species_id: null                        # Short label for your species, e.g. "MySpecies1"
genome_assembly: null                   # Path to unmasked genome FASTA
protein_ref: null                       # Path to reference protein FASTA

# ---- Optional: skip repeat masking ------------------------------------------
masked_genome: null                     # Provide to skip EarlGrey

# ---- Optional: RNA evidence for structural annotation -----------------------
rna_reads: null                         # Directory containing R1/R2 FASTQ files
bam: null                               # Pre-aligned RNA-seq BAM (use instead of rna_reads)
                                        # Accepts a glob, e.g. "/path/to/rnaseq/*.bam"

# ---- Optional: skip straight to functional annotation -----------------------
gene_annotation_gff: null              # Existing GFF3 annotation
transcript_aa_fasta: null              # Matching protein/AA FASTA

# ---- BUSCO ------------------------------------------------------------------
busco_lineage: "eukaryota_odb12"

# ---- Resources --------------------------------------------------------------
nthreads: 16

# ---- Dependency overrides (Polar2020 defaults used if left commented out) ---
# dfam_ref: "/path/to/dfam"
# interproscan: "/path/to/interpro"
